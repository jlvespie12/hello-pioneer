<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pioneer Notes</title>
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; }
      body {
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: #0b0d10;
        color: #f5f5f5;
        min-height: 100vh;
        padding: 2rem 1rem;
      }
      .wrap { max-width: 640px; margin: 0 auto; }
      h1 {
        font-size: clamp(2rem, 6vw, 3.5rem);
        font-weight: 800;
        letter-spacing: -.02em;
        margin: 0 0 1.5rem;
      }
      form { display: flex; flex-direction: column; gap: .5rem; margin-bottom: 2rem; }
      textarea {
        padding: .75rem;
        font: inherit;
        border: 1px solid #2a2e35;
        background: #14171c;
        color: inherit;
        border-radius: 6px;
        min-height: 96px;
        resize: vertical;
      }
      button {
        padding: .65rem 1.25rem;
        font: inherit;
        font-weight: 600;
        border: 0;
        border-radius: 6px;
        background: #4f46e5;
        color: white;
        cursor: pointer;
        align-self: flex-start;
      }
      button:disabled { opacity: .5; cursor: not-allowed; }
      ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: .5rem; }
      li {
        background: #14171c;
        border: 1px solid #2a2e35;
        padding: .75rem 1rem;
        border-radius: 6px;
      }
      .meta { font-size: .8rem; color: #8b91a0; margin-top: .25rem; }
      .err { color: #f87171; padding: .5rem 0; }
      .empty { color: #8b91a0; font-style: italic; padding: .5rem 0; }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>hello from Pioneer Species</h1>
      <form id="newnote">
        <textarea name="content" placeholder="Write a note&hellip;" required></textarea>
        <button type="submit">Post note</button>
      </form>
      <ul id="notes"></ul>
      <p id="status"></p>
    </main>

    <script type="module">
      import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

      // These tokens are replaced at build time by build.js using Vercel env vars.
      const SUPABASE_URL = '__SUPABASE_URL__';
      const SUPABASE_ANON_KEY = '__SUPABASE_ANON_KEY__';

      const status = document.getElementById('status');
      const list = document.getElementById('notes');
      const form = document.getElementById('newnote');

      function showError(msg) {
        status.className = 'err';
        status.textContent = msg;
      }

      function clearStatus() {
        status.className = '';
        status.textContent = '';
      }

      if (!SUPABASE_URL || SUPABASE_URL.includes('SUPABASE_URL')) {
        showError('Supabase environment variables not configured at build time.');
      } else {
        const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function loadNotes() {
          const { data, error } = await sb
            .from('notes')
            .select('id, title, content, created_at')
            .order('created_at', { ascending: false })
            .limit(50);
          if (error) { showError('Failed to load notes: ' + error.message); return; }
          list.innerHTML = '';
          if (data.length === 0) {
            const li = document.createElement('li');
            li.className = 'empty';
            li.textContent = 'No notes yet — be the first.';
            list.append(li);
            return;
          }
          for (const n of data) {
            const li = document.createElement('li');
            const c = document.createElement('div');
            c.textContent = n.content || n.title || '(empty)';
            const m = document.createElement('div');
            m.className = 'meta';
            m.textContent = new Date(n.created_at).toLocaleString();
            li.append(c, m);
            list.append(li);
          }
        }

        form.addEventListener('submit', async (e) => {
          e.preventDefault();
          const content = form.content.value.trim();
          if (!content) return;
          const btn = form.querySelector('button');
          btn.disabled = true;
          clearStatus();
          const title = content.slice(0, 60);
          const { error } = await sb.from('notes').insert({ title, content });
          if (error) {
            showError('Failed to post: ' + error.message);
          } else {
            form.reset();
            await loadNotes();
          }
          btn.disabled = false;
        });

        loadNotes();
      }
    </script>
  </body>
</html>
