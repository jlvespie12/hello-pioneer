<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pioneer Notes</title>
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; }
      body {
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: #0b0d10;
        color: #f5f5f5;
        min-height: 100vh;
        padding: 2rem 1rem;
      }
      .wrap { max-width: 640px; margin: 0 auto; }
      h1 {
        font-size: clamp(2rem, 6vw, 3.5rem);
        font-weight: 800;
        letter-spacing: -.02em;
        margin: 0 0 1.5rem;
      }
      form { display: flex; flex-direction: column; gap: .5rem; margin-bottom: 2rem; }
      textarea {
        padding: .75rem;
        font: inherit;
        border: 1px solid #2a2e35;
        background: #14171c;
        color: inherit;
        border-radius: 6px;
        min-height: 96px;
        resize: vertical;
      }
      button {
        padding: .65rem 1.25rem;
        font: inherit;
        font-weight: 600;
        border: 0;
        border-radius: 6px;
        background: #4f46e5;
        color: white;
        cursor: pointer;
        align-self: flex-start;
      }
      button:disabled { opacity: .5; cursor: not-allowed; }
      ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: .5rem; }
      li {
        background: #14171c;
        border: 1px solid #2a2e35;
        padding: .75rem 1rem;
        border-radius: 6px;
      }
      .meta { font-size: .8rem; color: #8b91a0; margin-top: .25rem; display: flex; align-items: center; gap: .75rem; }
      .meta-time { flex: 1; }
      .share-btn {
        padding: .25rem .6rem;
        font-size: .75rem;
        font-weight: 500;
        background: transparent;
        border: 1px solid #2a2e35;
        color: #c7d2fe;
        border-radius: 4px;
        cursor: pointer;
        align-self: auto;
      }
      .share-btn:hover { background: #1c2027; border-color: #4f46e5; }
      .share-btn:disabled { opacity: .5; cursor: not-allowed; }
      .ok { color: #34d399; padding: .5rem 0; }
      .err { color: #f87171; padding: .5rem 0; }
      .empty { color: #8b91a0; font-style: italic; padding: .5rem 0; }
      .activity {
        margin-top: .6rem;
        padding-top: .6rem;
        border-top: 1px dashed #2a2e35;
        display: flex;
        flex-direction: column;
        gap: .3rem;
        font-size: .78rem;
      }
      .activity-title {
        color: #8b91a0;
        text-transform: uppercase;
        letter-spacing: .06em;
        font-size: .68rem;
        font-weight: 600;
      }
      .activity-row {
        display: flex;
        align-items: center;
        gap: .5rem;
        color: #c2c8d4;
      }
      .activity-recipient { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .activity-time { color: #8b91a0; font-variant-numeric: tabular-nums; }
      .badge {
        display: inline-block;
        padding: 1px 7px;
        border-radius: 999px;
        font-size: .68rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: .04em;
      }
      .badge-sent      { background: #1f2937; color: #c7d2fe; }
      .badge-delivered { background: #064e3b; color: #6ee7b7; }
      .badge-opened    { background: #1e1b4b; color: #a5b4fc; }
      .badge-clicked   { background: #4c1d95; color: #ddd6fe; }
      .badge-bounced   { background: #450a0a; color: #fca5a5; }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>hello from Pioneer Species</h1>
      <form id="newnote">
        <textarea name="content" placeholder="Write a note&hellip;" required></textarea>
        <button type="submit">Post note</button>
      </form>
      <ul id="notes"></ul>
      <p id="status"></p>
    </main>

    <script type="module">
      import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

      // These tokens are replaced at build time by build.js using Vercel env vars.
      const SUPABASE_URL = '__SUPABASE_URL__';
      const SUPABASE_ANON_KEY = '__SUPABASE_ANON_KEY__';

      const status = document.getElementById('status');
      const list = document.getElementById('notes');
      const form = document.getElementById('newnote');

      function showError(msg) {
        status.className = 'err';
        status.textContent = msg;
      }

      function clearStatus() {
        status.className = '';
        status.textContent = '';
      }

      if (!SUPABASE_URL || SUPABASE_URL.includes('SUPABASE_URL')) {
        showError('Supabase environment variables not configured at build time.');
      } else {
        const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const STATUS_LABEL = {
          'sent': 'Sent',
          'email.delivered': 'Delivered',
          'email.opened': 'Opened',
          'email.clicked': 'Clicked',
          'email.bounced': 'Bounced',
        };
        const STATUS_CLASS = {
          'sent': 'badge-sent',
          'email.delivered': 'badge-delivered',
          'email.opened': 'badge-opened',
          'email.clicked': 'badge-clicked',
          'email.bounced': 'badge-bounced',
        };

        function fmtRel(d) {
          const diff = (Date.now() - new Date(d).getTime()) / 1000;
          if (diff < 5) return 'just now';
          if (diff < 60) return `${Math.floor(diff)}s ago`;
          if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
          if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
          if (diff < 86400 * 30) return `${Math.floor(diff / 86400)}d ago`;
          return new Date(d).toLocaleDateString();
        }

        async function loadEventsByNote(noteIds) {
          if (noteIds.length === 0) return new Map();
          const { data, error } = await sb
            .from('email_events')
            .select('note_id, recipient, event_type, created_at')
            .in('note_id', noteIds)
            .order('created_at', { ascending: true });
          if (error) return new Map();
          // Group by note_id, then keep the latest event per recipient.
          const byNote = new Map();
          for (const id of noteIds) byNote.set(id, new Map());
          for (const e of data) {
            const perRecipient = byNote.get(e.note_id);
            if (!perRecipient) continue;
            const prev = perRecipient.get(e.recipient);
            if (!prev || new Date(e.created_at) >= new Date(prev.created_at)) {
              perRecipient.set(e.recipient, e);
            }
          }
          return byNote;
        }

        function renderActivity(perRecipient) {
          if (!perRecipient || perRecipient.size === 0) return null;
          const wrap = document.createElement('div');
          wrap.className = 'activity';
          const title = document.createElement('div');
          title.className = 'activity-title';
          title.textContent = 'Email activity';
          wrap.append(title);
          const rows = [...perRecipient.values()].sort(
            (a, b) => new Date(b.created_at) - new Date(a.created_at)
          );
          for (const e of rows) {
            const row = document.createElement('div');
            row.className = 'activity-row';
            const r = document.createElement('span');
            r.className = 'activity-recipient';
            r.textContent = e.recipient;
            const b = document.createElement('span');
            b.className = `badge ${STATUS_CLASS[e.event_type] || 'badge-sent'}`;
            b.textContent = STATUS_LABEL[e.event_type] || e.event_type;
            const t = document.createElement('span');
            t.className = 'activity-time';
            t.textContent = fmtRel(e.created_at);
            row.append(r, b, t);
            wrap.append(row);
          }
          return wrap;
        }

        async function loadNotes() {
          const { data, error } = await sb
            .from('notes')
            .select('id, title, content, created_at')
            .order('created_at', { ascending: false })
            .limit(50);
          if (error) { showError('Failed to load notes: ' + error.message); return; }
          list.innerHTML = '';
          if (data.length === 0) {
            const li = document.createElement('li');
            li.className = 'empty';
            li.textContent = 'No notes yet — be the first.';
            list.append(li);
            return;
          }
          const eventsByNote = await loadEventsByNote(data.map(n => n.id));
          for (const n of data) {
            const li = document.createElement('li');
            const c = document.createElement('div');
            c.textContent = n.content || n.title || '(empty)';

            const m = document.createElement('div');
            m.className = 'meta';
            const time = document.createElement('span');
            time.className = 'meta-time';
            time.textContent = new Date(n.created_at).toLocaleString();

            const shareBtn = document.createElement('button');
            shareBtn.type = 'button';
            shareBtn.className = 'share-btn';
            shareBtn.textContent = 'Share via email';
            shareBtn.addEventListener('click', () => shareNote(n.id, shareBtn));

            m.append(time, shareBtn);
            li.append(c, m);

            const activity = renderActivity(eventsByNote.get(n.id));
            if (activity) li.append(activity);

            list.append(li);
          }
        }

        async function shareNote(noteId, btn) {
          const email = window.prompt('Recipient email address:');
          if (!email) return;
          const original = btn.textContent;
          btn.disabled = true;
          btn.textContent = 'Sending…';
          clearStatus();
          try {
            const resp = await fetch('/api/share', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ noteId, email }),
            });
            const out = await resp.json().catch(() => ({}));
            if (!resp.ok) {
              status.className = 'err';
              status.textContent = `Share failed: ${out.error || resp.status}${out.detail ? ' — ' + out.detail : ''}`;
            } else {
              status.className = 'ok';
              status.textContent = `Sent to ${email}.`;
              loadNotes();
            }
          } catch (e) {
            status.className = 'err';
            status.textContent = 'Network error: ' + e.message;
          }
          btn.disabled = false;
          btn.textContent = original;
        }

        form.addEventListener('submit', async (e) => {
          e.preventDefault();
          const content = form.content.value.trim();
          if (!content) return;
          const btn = form.querySelector('button');
          btn.disabled = true;
          clearStatus();
          const title = content.slice(0, 60);
          const { error } = await sb.from('notes').insert({ title, content });
          if (error) {
            showError('Failed to post: ' + error.message);
          } else {
            form.reset();
            await loadNotes();
          }
          btn.disabled = false;
        });

        loadNotes();
      }
    </script>
  </body>
</html>
